<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEKSEL GENESIS — NEO-KAI 01</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Syncopate:wght@400;700&family=Lexend:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #c9a84c;
  --gold-light: #e8c96a;
  --cyan: #00f5ff;
  --purple: #9b30ff;
  --pink: #ff00cc;
  --onyx: #060608;
  --surface: #0c0c10;
}

html { scroll-behavior: smooth; }

body {
  background: var(--onyx);
  color: #fff;
  font-family: 'Lexend', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  cursor: crosshair;
}

::selection { background: var(--purple); color: #fff; }
::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-track { background: var(--onyx); }
::-webkit-scrollbar-thumb { background: rgba(155,48,255,0.4); }

/* NOISE */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  background-size: 180px;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.5;
}

/* SCAN LINE */
.scan-line {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(155,48,255,0.3), rgba(0,245,255,0.3), transparent);
  z-index: 9998;
  pointer-events: none;
  animation: scan 10s linear infinite;
}

@keyframes scan {
  0% { transform: translateY(0); }
  100% { transform: translateY(100vh); }
}

/* PROGRESS */
.progress-line {
  position: fixed;
  left: 0; top: 0;
  width: 2px; height: 0%;
  background: linear-gradient(to bottom, var(--purple), var(--cyan));
  z-index: 9997;
  transition: height 0.05s linear;
  opacity: 0.7;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 500;
  padding: 1.5rem 3rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(to bottom, rgba(6,6,8,0.95), transparent);
}

.nav-logo {
  height: 44px;
  width: auto;
  object-fit: contain;
  filter: drop-shadow(0 0 8px rgba(155,48,255,0.5));
}

.nav-links {
  display: flex;
  gap: 3rem;
  align-items: center;
}

.nav-link {
  font-family: 'Syncopate', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.35);
  text-decoration: none;
  text-transform: uppercase;
  transition: color 0.3s;
}

.nav-link:hover { color: var(--cyan); }

.nav-cta {
  font-family: 'Syncopate', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.25em;
  padding: 0.6rem 1.4rem;
  border: 1px solid rgba(155,48,255,0.5);
  color: var(--purple);
  text-decoration: none;
  transition: all 0.3s;
}

.nav-cta:hover {
  background: rgba(155,48,255,0.1);
  border-color: var(--purple);
  box-shadow: 0 0 20px rgba(155,48,255,0.2);
}

/* LABELS */
.label {
  font-family: 'Syncopate', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
}

/* ═══ HERO ═══ */
.hero {
  position: relative;
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  overflow: hidden;
  padding-top: 5rem;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 50% 70% at 70% 50%, rgba(155,48,255,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 50% at 30% 40%, rgba(0,245,255,0.04) 0%, transparent 60%);
}

.hero-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(155,48,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(155,48,255,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  mask-image: radial-gradient(ellipse 80% 80% at 70% 50%, black, transparent);
}

.hero-left {
  padding: 4rem 3rem 4rem 5rem;
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.4rem 1rem;
  border: 1px solid rgba(0,245,255,0.2);
  background: rgba(0,245,255,0.04);
  width: fit-content;
}

.hero-badge span {
  font-family: 'Syncopate', monospace;
  font-size: 0.45rem;
  letter-spacing: 0.3em;
  color: var(--cyan);
}

.hero-badge-dot {
  width: 5px; height: 5px;
  background: var(--cyan);
  border-radius: 50%;
  animation: blink 1.5s step-end infinite;
}

@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

.hero-eyebrow {
  color: rgba(155,48,255,0.7);
  font-size: 0.5rem;
  letter-spacing: 0.4em;
  font-family: 'Syncopate', monospace;
}

.hero-title {
  font-family: 'Syncopate', monospace;
  font-size: clamp(2.5rem, 4.5vw, 5rem);
  font-weight: 700;
  line-height: 1.0;
  letter-spacing: 0.03em;
}

.hero-title .line-white { color: #fff; display: block; }
.hero-title .line-gradient {
  display: block;
  background: linear-gradient(135deg, #ff00cc, #9b30ff, #00f5ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1rem, 1.5vw, 1.25rem);
  font-style: italic;
  color: rgba(255,255,255,0.4);
  max-width: 400px;
  line-height: 1.7;
}

.hero-divider {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, var(--purple), var(--cyan));
}

.hero-stats {
  display: flex;
  gap: 2.5rem;
}

.stat {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}

.stat-num {
  font-family: 'Syncopate', monospace;
  font-size: 1.4rem;
  font-weight: 700;
  color: #fff;
}

.stat-label {
  font-family: 'Syncopate', monospace;
  font-size: 0.4rem;
  letter-spacing: 0.25em;
  color: rgba(255,255,255,0.25);
}

.hero-ctas {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
}

.btn-primary {
  padding: 1rem 2.5rem;
  background: linear-gradient(135deg, #9b30ff, #ff00cc);
  border: none;
  color: #fff;
  font-family: 'Syncopate', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.25em;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.4s;
  text-transform: uppercase;
}

.btn-primary::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #ff00cc, #00f5ff);
  opacity: 0;
  transition: opacity 0.4s;
}

.btn-primary:hover::before { opacity: 1; }
.btn-primary:hover { box-shadow: 0 0 30px rgba(155,48,255,0.4); }
.btn-primary span { position: relative; z-index: 1; }

.btn-secondary {
  padding: 1rem 2rem;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.6);
  font-family: 'Syncopate', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.25em;
  cursor: pointer;
  transition: all 0.4s;
  text-transform: uppercase;
}

.btn-secondary:hover {
  border-color: rgba(0,245,255,0.4);
  color: var(--cyan);
}

/* HERO RIGHT — SHOE IMAGE */
.hero-right {
  position: relative;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.shoe-image-wrap {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.shoe-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  position: relative;
  z-index: 2;
}

.shoe-glow-left {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 120px;
  background: linear-gradient(to right, var(--onyx), transparent);
  z-index: 3;
  pointer-events: none;
}

.shoe-glow-bottom {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 200px;
  background: linear-gradient(to top, var(--onyx), transparent);
  z-index: 3;
  pointer-events: none;
}

/* FLOATING TAGS */
.float-tag {
  position: absolute;
  z-index: 4;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 0.75rem;
  background: rgba(6,6,8,0.85);
  border: 1px solid rgba(155,48,255,0.3);
  backdrop-filter: blur(8px);
  animation: floatY 4s ease-in-out infinite;
}

@keyframes floatY {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.float-tag-2 { animation-delay: 1.5s; }
.float-tag-3 { animation-delay: 3s; border-color: rgba(0,245,255,0.3); }

.float-tag-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--purple);
  flex-shrink: 0;
}

.float-tag-dot.cyan { background: var(--cyan); }

.float-tag-text {
  font-family: 'Syncopate', monospace;
  font-size: 0.42rem;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.7);
}

/* ═══ COUNTDOWN ═══ */
.countdown-section {
  padding: 7rem 5rem;
  position: relative;
  background: var(--surface);
  overflow: hidden;
}

.countdown-section::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--purple), var(--cyan), transparent);
}

.countdown-section::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--purple), transparent);
}

.countdown-inner {
  max-width: 900px;
  margin: 0 auto;
  text-align: center;
}

.countdown-digits {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 0;
  margin: 3rem 0;
}

.digit-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 2.5rem;
  position: relative;
}

.digit-block:not(:last-child)::after {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 2rem;
  width: 1px;
  background: rgba(255,255,255,0.05);
}

.digit-num {
  font-family: 'Syncopate', monospace;
  font-weight: 700;
  font-size: clamp(4rem, 8vw, 7.5rem);
  line-height: 1;
  background: linear-gradient(135deg, #fff 40%, rgba(155,48,255,0.6));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  transition: all 0.3s;
}

.digit-sep {
  font-family: 'Syncopate', monospace;
  font-size: clamp(3rem, 6vw, 6rem);
  color: var(--purple);
  opacity: 0.3;
  padding: 0;
  margin-top: 0.1em;
  animation: sepBlink 1s step-end infinite;
}

@keyframes sepBlink { 0%,100%{opacity:0.3;} 50%{opacity:0.08;} }

.digit-label {
  font-family: 'Syncopate', monospace;
  font-size: 0.42rem;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.2);
  margin-top: 0.75rem;
}

.countdown-moment {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  margin-top: 2rem;
}

.moment-line {
  flex: 1;
  max-width: 120px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1));
}

.moment-line.right {
  background: linear-gradient(90deg, rgba(255,255,255,0.1), transparent);
}

.moment-text {
  font-family: 'Syncopate', monospace;
  font-size: 0.48rem;
  letter-spacing: 0.4em;
  color: rgba(255,255,255,0.25);
}

.moment-time {
  color: var(--cyan);
  font-size: 0.6rem;
}

/* ═══ MANIFESTO ═══ */
.manifesto {
  padding: 8rem 5rem;
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 5rem;
  align-items: center;
  max-width: 1200px;
  margin: 0 auto;
}

.manifesto-label-col {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.manifesto-vert {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  font-family: 'Syncopate', monospace;
  font-size: 0.45rem;
  letter-spacing: 0.4em;
  color: rgba(255,255,255,0.15);
  align-self: flex-start;
}

blockquote {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.6rem, 3vw, 2.8rem);
  font-weight: 300;
  font-style: italic;
  line-height: 1.45;
  color: rgba(255,255,255,0.85);
}

blockquote em {
  font-style: normal;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.manifesto-body {
  margin-top: 2rem;
  font-size: 0.9rem;
  color: rgba(255,255,255,0.3);
  line-height: 1.9;
  font-weight: 200;
  max-width: 480px;
}

/* ═══ FEATURES GRID ═══ */
.features {
  padding: 6rem 5rem;
  background: var(--surface);
  position: relative;
}

.features::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(155,48,255,0.3), transparent);
}

.features-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 4rem;
  max-width: 1200px;
  margin-left: auto;
  margin-right: auto;
}

.features-title {
  font-family: 'Syncopate', monospace;
  font-size: clamp(1.2rem, 2.5vw, 2rem);
  font-weight: 700;
  line-height: 1.2;
}

.features-title span { color: var(--purple); }

.features-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: rgba(155,48,255,0.08);
  max-width: 1200px;
  margin: 0 auto;
}

.feat-card {
  background: var(--surface);
  padding: 2.2rem 1.8rem;
  position: relative;
  overflow: hidden;
  transition: background 0.4s;
  cursor: default;
}

.feat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--purple), var(--cyan));
  opacity: 0;
  transition: opacity 0.4s;
}

.feat-card:hover { background: rgba(155,48,255,0.04); }
.feat-card:hover::before { opacity: 1; }

.feat-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 3.5rem;
  color: rgba(155,48,255,0.08);
  line-height: 1;
  position: absolute;
  top: 1rem; right: 1.5rem;
  font-style: italic;
  pointer-events: none;
}

.feat-icon {
  width: 32px; height: 32px;
  margin-bottom: 1.5rem;
  opacity: 0.6;
}

.feat-label {
  font-family: 'Syncopate', monospace;
  font-size: 0.42rem;
  letter-spacing: 0.3em;
  color: var(--cyan);
  opacity: 0.6;
  margin-bottom: 0.6rem;
}

.feat-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  font-weight: 300;
  color: #fff;
  margin-bottom: 0.75rem;
  line-height: 1.2;
}

.feat-desc {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.3);
  line-height: 1.8;
  font-weight: 200;
}

/* ═══ SPEC ═══ */
.spec-section {
  padding: 7rem 5rem;
  max-width: 800px;
  margin: 0 auto;
}

.spec-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.2rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

.spec-row:last-child { border-bottom: none; }

.spec-key {
  font-family: 'Syncopate', monospace;
  font-size: 0.45rem;
  letter-spacing: 0.25em;
  color: rgba(255,255,255,0.25);
}

.spec-val {
  font-size: 0.85rem;
  font-weight: 200;
  color: rgba(255,255,255,0.65);
}

.spec-val.accent {
  background: linear-gradient(135deg, var(--pink), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 400;
}

/* ═══ CTA ═══ */
.cta-section {
  padding: 8rem 5rem;
  position: relative;
  overflow: hidden;
  background: var(--surface);
  text-align: center;
}

.cta-section::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--pink), var(--purple), var(--cyan), transparent);
}

.cta-bg-glow {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(155,48,255,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.cta-logo {
  height: 80px;
  object-fit: contain;
  filter: drop-shadow(0 0 20px rgba(155,48,255,0.4));
  margin: 0 auto 2rem;
  display: block;
}

.cta-headline {
  font-family: 'Syncopate', monospace;
  font-size: clamp(1.5rem, 4vw, 3.5rem);
  font-weight: 700;
  line-height: 1.05;
  margin-bottom: 0.5rem;
}

.cta-headline .dim { color: rgba(255,255,255,0.3); }

.cta-headline .grad {
  background: linear-gradient(135deg, #ff00cc, #9b30ff, #00f5ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.cta-sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-style: italic;
  color: rgba(255,255,255,0.25);
  margin-bottom: 3rem;
}

.price-wrap {
  margin-bottom: 2rem;
}

.price-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3rem, 6vw, 5rem);
  font-weight: 300;
  background: linear-gradient(135deg, #e8c96a, #c9a84c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}

.price-label {
  font-family: 'Syncopate', monospace;
  font-size: 0.42rem;
  letter-spacing: 0.35em;
  color: rgba(201,168,76,0.4);
  margin-top: 0.4rem;
}

.urgency-bar {
  max-width: 400px;
  margin: 0 auto 2.5rem;
}

.urgency-bar-top {
  display: flex;
  justify-content: space-between;
  margin-bottom: 0.5rem;
}

.urgency-bar-track {
  height: 2px;
  background: rgba(255,255,255,0.05);
  overflow: hidden;
}

.urgency-bar-fill {
  height: 100%;
  width: 84%;
  background: linear-gradient(90deg, rgba(155,48,255,0.4), var(--purple), var(--pink));
}

.cta-buttons {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}

/* FOOTER */
footer {
  padding: 3rem 5rem;
  border-top: 1px solid rgba(255,255,255,0.04);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1rem;
}

.footer-logo {
  height: 32px;
  filter: drop-shadow(0 0 6px rgba(155,48,255,0.3));
  opacity: 0.6;
}

.footer-links {
  display: flex;
  gap: 2.5rem;
}

.footer-link {
  font-family: 'Syncopate', monospace;
  font-size: 0.42rem;
  letter-spacing: 0.25em;
  color: rgba(255,255,255,0.15);
  text-decoration: none;
}

.footer-time {
  font-family: 'Syncopate', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.3em;
  color: rgba(0,245,255,0.3);
}

/* SCROLL OBSERVE */
.observe {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 0.9s cubic-bezier(0.16,1,0.3,1);
}
.observe.visible { opacity: 1; transform: translateY(0); }
.d1 { transition-delay: 0.1s; }
.d2 { transition-delay: 0.2s; }
.d3 { transition-delay: 0.3s; }
.d4 { transition-delay: 0.4s; }
.d5 { transition-delay: 0.5s; }

/* HERO ENTRY */
.hero-entry { animation: heroFadeUp 1.1s cubic-bezier(0.16,1,0.3,1) both; }
.he1 { animation-delay: 0.3s; opacity: 0; }
.he2 { animation-delay: 0.5s; opacity: 0; }
.he3 { animation-delay: 0.7s; opacity: 0; }
.he4 { animation-delay: 0.9s; opacity: 0; }
.he5 { animation-delay: 1.1s; opacity: 0; }
.he6 { animation-delay: 1.3s; opacity: 0; }
.hero-img-entry { animation: heroImgIn 1.6s cubic-bezier(0.16,1,0.3,1) 0.4s both; opacity: 0; }

@keyframes heroFadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes heroImgIn {
  from { opacity: 0; transform: scale(1.04); }
  to { opacity: 1; transform: scale(1); }
}

@media (max-width: 800px) {
  .hero { grid-template-columns: 1fr; }
  .hero-right { height: 55vh; }
  .hero-left { padding: 2rem; }
  .manifesto { grid-template-columns: 1fr; gap: 2rem; padding: 4rem 2rem; }
  .features { padding: 4rem 2rem; }
  .features-grid { grid-template-columns: 1fr; }
  .countdown-section { padding: 5rem 2rem; }
  nav { padding: 1.2rem 1.5rem; }
  .nav-links { display: none; }
  footer { padding: 2rem; flex-direction: column; align-items: flex-start; }
  .cta-section { padding: 5rem 2rem; }
  .spec-section { padding: 4rem 2rem; }
}
</style>
