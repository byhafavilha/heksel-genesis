<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HEKSEL IMPERIUM — NEO Collection 2026</title>
  <link rel="icon" href="1000027280.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════
       RESET + VARIÁVEIS CYBERPUNK DE LUXO
    ═══════════════════════════════════════════════ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white:         #ffffff;
      --ice:           #f5f6f8;
      --ink:           #08080d;
      --muted:         #6b7280;
      --border:        rgba(255,255,255,0.08);
      --border-light:  #e5e7eb;
      --cyan:          #00f0ff;
      --cyan-dim:      rgba(0,240,255,0.15);
      --cyan-glow:     rgba(0,240,255,0.5);
      --purple:        #b45eff;
      --purple-dim:    rgba(180,94,255,0.15);
      --purple-glow:   rgba(180,94,255,0.5);
      --gold:          #c9a84c;
      --gold-light:    #f5d97f;
      --neon:          #00ffc3;
      --card-dark:     rgba(14,14,22,0.92);
      --glass-dark:    rgba(10,10,18,0.85);
      --surface:       rgba(255,255,255,0.04);

      --ease:          cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-bounce:   cubic-bezier(0.2, 0.9, 0.4, 1.1);
      --transition:    0.45s var(--ease);
      --transition-fast: 0.25s var(--ease);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--ink);
      color: var(--white);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* ═══════════════════════════════════════════════
       CURSOR CUSTOM PREMIUM
    ═══════════════════════════════════════════════ */
    * { cursor: none; }
    #cur {
      position: fixed; width: 8px; height: 8px;
      background: var(--cyan); border-radius: 50%;
      pointer-events: none; z-index: 99999;
      transform: translate(-50%,-50%);
      transition: width .3s, height .3s, background .3s, box-shadow .3s;
      box-shadow: 0 0 12px var(--cyan-glow);
    }
    #cur.hover {
      width: 44px; height: 44px;
      background: rgba(0,240,255,0.1);
      border: 1.5px solid var(--cyan);
      box-shadow: 0 0 30px var(--cyan-glow), 0 0 60px rgba(0,240,255,0.2);
    }
    #cur-ring {
      position: fixed; width: 36px; height: 36px;
      border: 1.5px solid rgba(0,240,255,0.4);
      border-radius: 50%; pointer-events: none;
      z-index: 99998; transform: translate(-50%,-50%);
      transition: all .18s var(--ease);
    }
    @media (pointer: coarse) { #cur, #cur-ring { display: none; } }

    /* ═══════════════════════════════════════════════
       FUNDO ANIMADO — GRID CYBERPUNK
    ═══════════════════════════════════════════════ */
    .animated-bg {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -2;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(0,240,255,0.04), transparent 70%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(180,94,255,0.05), transparent 70%),
        var(--ink);
      overflow: hidden;
    }
    .animated-bg::before {
      content: '';
      position: absolute; width: 200%; height: 200%;
      top: -50%; left: -50%;
      background:
        linear-gradient(rgba(0,240,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      animation: bgMove 60s linear infinite;
      pointer-events: none;
    }
    .animated-bg::after {
      content: '';
      position: absolute; width: 100%; height: 100%;
      background: radial-gradient(ellipse at 50% 100%, rgba(180,94,255,0.08), transparent 65%);
      animation: pulseBg 12s ease-in-out infinite;
    }
    @keyframes bgMove {
      0%   { transform: translate(0, 0); }
      100% { transform: translate(4%, 4%); }
    }
    @keyframes pulseBg {
      0%, 100% { opacity: 0.4; } 50% { opacity: 1; }
    }

    .particle {
      position: fixed;
      background: radial-gradient(circle, rgba(0,240,255,0.7), rgba(180,94,255,0.15));
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
      animation: floatParticle linear infinite;
    }
    @keyframes floatParticle {
      0%   { transform: translateY(100vh) rotate(0deg);   opacity: 0;   }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0;   }
    }

    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(40px); filter: blur(6px); }
      100% { opacity: 1; transform: translateY(0);    filter: blur(0);   }
    }
    @keyframes fadeInLeft {
      0%   { opacity: 0; transform: translateX(-50px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeInRight {
      0%   { opacity: 0; transform: translateX(50px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes glowPulse {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(0,240,255,0.4)); }
      50%       { filter: drop-shadow(0 0 18px rgba(0,240,255,0.9)) drop-shadow(0 0 8px rgba(180,94,255,0.7)); }
    }
    @keyframes scanline {
      0%   { top: -5%; }
      100% { top: 105%; }
    }
    @keyframes borderNeon {
      0%,100% { border-color: rgba(0,240,255,0.3); box-shadow: 0 0 12px rgba(0,240,255,0.1); }
      50%      { border-color: rgba(180,94,255,0.6); box-shadow: 0 0 24px rgba(180,94,255,0.2); }
    }

    .animate-text  { animation: fadeUp 0.9s var(--ease) forwards; opacity: 0; }
    .animate-left  { animation: fadeInLeft 0.9s var(--ease) forwards; opacity: 0; }
    .animate-right { animation: fadeInRight 0.9s var(--ease) forwards; opacity: 0; }

    .glow-text {
      background: linear-gradient(120deg, var(--cyan) 0%, var(--purple) 60%, #ff2d78 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      animation: glowPulse 3s ease-in-out infinite;
    }
    .glow-gold {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    button, .btn-primary, .btn-outline-nav, .btn-gold-nav,
    .cta-brand, .notify-btn-card, .btn-next,
    .btn-send-wa, .btn-send-email, .package-item {
      transition: all var(--transition);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    button::after, .btn-primary::after, .cta-brand::after,
    .notify-btn-card::after, .btn-next::after,
    .btn-send-wa::after, .btn-send-email::after {
      content: '';
      position: absolute; top: 50%; left: 50%;
      width: 0; height: 0; border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transform: translate(-50%,-50%);
      transition: width .6s, height .6s, opacity .6s;
      z-index: 0; pointer-events: none;
    }
    button:active::after, .btn-primary:active::after, .cta-brand:active::after,
    .notify-btn-card:active::after, .btn-next:active::after,
    .btn-send-wa:active::after, .btn-send-email:active::after {
      width: 240px; height: 240px; opacity: 0;
    }
    button > *, .btn-primary > *, .cta-brand > *,
    .notify-btn-card > *, .btn-next > *,
    .btn-send-wa > *, .btn-send-email > * { position: relative; z-index: 1; }

    .btn-primary {
      background: rgba(255,255,255,0.05);
      color: white;
      border: 1.5px solid rgba(0,240,255,0.4);
      padding: 14px 30px;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(8px);
    }
    .btn-primary:hover {
      background: rgba(0,240,255,0.12);
      border-color: var(--cyan);
      box-shadow: 0 0 30px rgba(0,240,255,0.25), 0 16px 40px rgba(0,0,0,0.3);
      transform: translateY(-4px);
      color: var(--cyan);
    }

    .btn-outline-nav {
      padding: 9px 20px;
      border-radius: 50px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: transparent;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.8);
      text-transform: uppercase;
    }
    .btn-outline-nav:hover {
      background: rgba(255,255,255,0.08);
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 16px rgba(0,240,255,0.2);
      transform: translateY(-2px);
    }

    .btn-gold-nav {
      padding: 9px 20px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
      background-size: 200% 200%;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: #1a0f00;
      text-transform: uppercase;
      animation: goldPulse 2.5s ease-in-out infinite, goldShift 4s ease infinite;
    }
    @keyframes goldPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.6), 0 8px 20px rgba(201,168,76,0.2); }
      60%      { box-shadow: 0 0 0 10px rgba(201,168,76,0), 0 8px 20px rgba(201,168,76,0.3); }
    }
    @keyframes goldShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .btn-gold-nav:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 40px rgba(201,168,76,0.5), 0 16px 32px rgba(201,168,76,0.2) !important;
      filter: brightness(1.1);
    }

    .cta-brand {
      background: linear-gradient(135deg, var(--purple), var(--cyan), var(--purple));
      background-size: 300% 300%;
      border: none;
      color: white;
      padding: 18px 48px;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.88rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      animation: gradientShift 4s ease infinite;
    }
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .cta-brand:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 60px rgba(180,94,255,0.5), 0 0 30px rgba(0,240,255,0.3), 0 24px 48px rgba(0,0,0,0.4);
    }

    .notify-btn-card {
      width: 100%;
      margin-top: 14px;
      background: rgba(0,240,255,0.08);
      color: var(--cyan);
      border: 1.5px solid rgba(0,240,255,0.3);
      padding: 11px;
      border-radius: 50px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .notify-btn-card:hover {
      background: var(--cyan);
      color: var(--ink);
      border-color: var(--cyan);
      box-shadow: 0 0 30px rgba(0,240,255,0.5), 0 12px 28px rgba(0,0,0,0.3);
      transform: translateY(-3px);
    }

    .package-item {
      background: rgba(255,255,255,0.03);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      transition: all 0.3s var(--ease);
    }
    .package-item:hover {
      transform: translateX(6px) scale(1.01);
      background: var(--purple-dim);
      border-color: var(--purple);
      box-shadow: 0 0 20px rgba(180,94,255,0.15);
    }
    .package-item.selected-package {
      border-color: var(--purple);
      background: rgba(180,94,255,0.08);
      box-shadow: 0 0 24px rgba(180,94,255,0.2);
    }

    nav {
      position: fixed; top: 0; left: 0; width: 100%;
      padding: 0 5%; height: 68px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(8,8,13,0.75);
      backdrop-filter: blur(28px) saturate(1.4);
      border-bottom: 1px solid rgba(0,240,255,0.08);
      z-index: 800;
      transition: background .4s, border-color .4s, box-shadow .4s;
    }
    nav.scrolled {
      background: rgba(8,8,13,0.92);
      border-bottom-color: rgba(0,240,255,0.2);
      box-shadow: 0 4px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,240,255,0.05);
    }

    .logo {
      display: flex; align-items: center; gap: 10px; text-decoration: none;
    }
    .logo img { height: 30px; width: auto; }
    .logo span {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1rem;
      letter-spacing: 0.18em; color: var(--white);
      text-transform: uppercase;
    }

    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      text-decoration: none; font-size: 0.68rem; font-weight: 600;
      text-transform: uppercase; color: rgba(255,255,255,0.45);
      letter-spacing: 0.14em;
      transition: color .3s;
      position: relative; padding-bottom: 4px;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 0; height: 1.5px;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      transition: width .35s var(--ease);
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--white);
    }
    .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }

    .nav-buttons { display: flex; gap: 10px; align-items: center; }

    .hero {
      min-height: 100vh;
      display: grid; grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 110px 5% 70px; gap: 48px;
      position: relative; overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,240,255,0.15), transparent);
      animation: scanline 8s linear infinite;
      pointer-events: none; z-index: 0;
    }

    .hero-left { position: relative; z-index: 1; }

    .hero-left .badge {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.22em; color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 24px;
      display: inline-flex; align-items: center; gap: 10px;
      animation: fadeUp 0.9s var(--ease) forwards;
      background: rgba(0,240,255,0.08);
      padding: 8px 16px; border-radius: 50px;
      border: 1px solid rgba(0,240,255,0.2);
    }

    .badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    .hero-left h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(3.2rem, 6.5vw, 6rem);
      line-height: 0.9; letter-spacing: -0.03em;
      margin-bottom: 28px;
      color: var(--white);
      animation: fadeUp 0.9s 0.2s var(--ease) forwards; opacity: 0;
    }

    .hero-left p {
      font-size: 1.05rem; color: rgba(255,255,255,0.55);
      max-width: 400px; margin-bottom: 40px;
      line-height: 1.75; font-weight: 300;
      animation: fadeUp 0.9s 0.4s var(--ease) forwards; opacity: 0;
      letter-spacing: 0.01em;
    }

    .hero-actions {
      display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 52px;
      animation: fadeUp 0.9s 0.6s var(--ease) forwards; opacity: 0;
    }

    .hero-stats {
      display: flex; gap: 40px;
      animation: fadeUp 0.9s 0.8s var(--ease) forwards; opacity: 0;
    }
    .stat-item { text-align: center; }
    .stat-num {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.6rem;
      color: var(--white); display: block; line-height: 1;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .stat-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem; color: rgba(255,255,255,0.3);
      letter-spacing: 0.2em; text-transform: uppercase; margin-top: 4px;
      display: block;
    }
    .stat-divider {
      width: 1px; background: rgba(0,240,255,0.15);
      align-self: stretch;
    }

    .hero-right {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .hero-right::before {
      content: '';
      position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%);
      width: 80%; height: 30%;
      background: radial-gradient(ellipse, rgba(0,240,255,0.22) 0%, rgba(180,94,255,0.12) 50%, transparent 75%);
      filter: blur(28px);
      z-index: -1;
    }

    .media-section {
      padding: 100px 5% 80px;
      background: rgba(6,6,12,0.98);
      position: relative; overflow: hidden;
      text-align: center;
    }
    .media-section::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(0,240,255,0.06), transparent);
      pointer-events: none;
    }

    .video-container {
      max-width: 680px; margin: 0 auto 48px;
      border-radius: 20px; overflow: hidden;
      position: relative;
      border: 1.5px solid rgba(0,240,255,0.35);
      box-shadow:
        0 0 40px rgba(0,240,255,0.12),
        0 0 80px rgba(180,94,255,0.08),
        0 40px 80px rgba(0,0,0,0.6),
        inset 0 0 40px rgba(0,0,0,0.3);
      animation: borderNeon 4s ease-in-out infinite;
    }
    .video-container video {
      width: 100%; display: block;
      max-height: 420px;
      object-fit: cover;
      border-radius: 18px;
    }
    .video-container::after {
      content: '🎬 DROP 01 — OFFICIAL';
      position: absolute; top: 16px; left: 16px;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem; letter-spacing: 0.14em;
      color: rgba(255,255,255,0.9);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 6px 14px; border-radius: 50px;
      pointer-events: none;
    }

    .hero-shoe-neon {
      max-width: 420px; margin: 0 auto;
      position: relative;
    }
    .hero-shoe-neon::before {
      content: '';
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 85%; height: 40%;
      background: radial-gradient(ellipse, rgba(180,94,255,0.4), rgba(0,240,255,0.2) 50%, transparent 75%);
      filter: blur(24px); z-index: 0;
    }
    .hero-shoe-neon img {
      max-width: 100%; width: 90%;
      border-radius: 24px;
      box-shadow:
        0 0 40px rgba(180,94,255,0.5),
        0 0 80px rgba(180,94,255,0.2),
        0 30px 60px rgba(0,0,0,0.6);
      transition: all .5s var(--ease);
      position: relative; z-index: 1;
      display: block; margin: 0 auto;
    }
    .hero-shoe-neon img:hover {
      transform: scale(1.04) translateY(-8px);
      box-shadow:
        0 0 60px rgba(0,240,255,0.6),
        0 0 100px rgba(180,94,255,0.3),
        0 40px 80px rgba(0,0,0,0.7);
    }

    .brand-section {
      padding: 120px 5%; text-align: center;
      background: linear-gradient(180deg, rgba(8,8,18,0.98) 0%, rgba(14,6,28,0.98) 100%);
      color: white; position: relative; z-index: 1;
      overflow: hidden;
    }
    .brand-section::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 70% at 50% 50%, rgba(180,94,255,0.1), transparent 70%);
      pointer-events: none;
    }
    .brand-section h2 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.2rem, 5.5vw, 4rem);
      font-weight: 800; line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 22px;
      position: relative; z-index: 1;
    }
    .brand-section > p {
      color: rgba(255,255,255,0.45);
      max-width: 580px; margin: 0 auto 40px;
      font-size: 1.05rem; font-weight: 300; line-height: 1.75;
      position: relative; z-index: 1;
    }
    #openBrandModalBtn { position: relative; z-index: 1; }

    .brand-perks {
      margin-top: 32px;
      display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;
      position: relative; z-index: 1;
    }
    .brand-perk-item {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 9px 18px; border-radius: 50px;
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.08em; color: rgba(255,255,255,0.6);
      transition: all .3s var(--ease);
    }

    /* ─── CAROUSEL OFFICIAL 8 IMAGENS ─── */
    .hero-carousel {
      position: relative;
      width: 100%; max-width: 640px;
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
    }

    .carousel-track {
      position: relative; width: 100%;
      min-height: 500px;
      display: flex; align-items: center; justify-content: center;
    }

    .carousel-slide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .55s var(--ease), transform .55s var(--ease);
      transform: translateX(60px) scale(0.96);
    }
    .carousel-slide.active {
      opacity: 1; pointer-events: auto;
      transform: translateX(0) scale(1);
    }
    .carousel-slide.exit-left {
      opacity: 0;
      transform: translateX(-60px) scale(0.96);
    }
    .carousel-slide.exit-right {
      opacity: 0;
      transform: translateX(60px) scale(0.96);
    }

    .carousel-glow {
      position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 90%; height: 40%;
      background: radial-gradient(ellipse,
        rgba(0,240,255,0.22) 0%,
        rgba(180,94,255,0.12) 50%,
        transparent 75%);
      filter: blur(30px); z-index: 0;
      animation: glowBreathe 4s ease-in-out infinite;
    }
    @keyframes glowBreathe {
      0%,100% { opacity:.7; transform: translateX(-50%) scaleY(1); }
      50%      { opacity:1;  transform: translateX(-50%) scaleY(1.15); }
    }

    .carousel-slide img {
      width: 100%; max-width: 640px;
      filter: drop-shadow(0 50px 70px rgba(0,0,0,.5))
              drop-shadow(0 0 50px rgba(0,240,255,.12));
      animation: float 6s ease-in-out infinite;
      position: relative; z-index: 2;
      transition: filter .5s;
      transform-origin: center bottom;
    }
    .carousel-slide.active img:hover {
      filter: drop-shadow(0 50px 90px rgba(0,0,0,.6))
              drop-shadow(0 0 70px rgba(0,240,255,.28))
              drop-shadow(0 0 35px rgba(180,94,255,.22));
    }
    @keyframes float {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-18px) rotate(0deg); }
    }

    .carousel-label {
      position: absolute; bottom: 2px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      z-index: 3; white-space: nowrap;
    }
    .carousel-label-tag {
      font-family: 'Space Mono', monospace;
      font-size: .55rem; letter-spacing: .2em;
      color: rgba(0,240,255,.5); text-transform: uppercase;
    }
    .carousel-label-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: .8rem;
      letter-spacing: .14em; color: rgba(255,255,255,.75);
    }

    .carousel-nav {
      display: flex; align-items: center;
      justify-content: center; gap: 20px;
      width: 100%; position: relative; z-index: 5;
    }

    .carousel-arrow {
      width: 44px; height: 44px;
      background: rgba(180,94,255,.08);
      border: 1.5px solid rgba(180,94,255,.35);
      border-radius: 12px;
      color: var(--purple);
      display: flex; align-items: center; justify-content: center;
      transition: all .35s var(--ease);
      backdrop-filter: blur(8px);
      flex-shrink: 0;
    }
    .carousel-arrow svg { width: 18px; height: 18px; }
    .carousel-arrow:hover {
      background: rgba(180,94,255,.2);
      border-color: var(--purple);
      box-shadow: 0 0 24px var(--purple-glow), 0 8px 20px rgba(0,0,0,.3);
      transform: scale(1.12);
      color: #fff;
    }
    .carousel-arrow:active { transform: scale(0.93); }

    .carousel-dots {
      display: flex; gap: 6px; align-items: center;
      flex-wrap: nowrap; overflow: hidden;
    }
    .carousel-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,.18);
      transition: all .35s var(--ease);
      cursor: pointer; flex-shrink: 0;
    }
    .carousel-dot.active {
      width: 20px; border-radius: 3px;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      box-shadow: 0 0 8px var(--cyan-glow);
    }
    .carousel-dot:hover { background: rgba(180,94,255,.5); }
