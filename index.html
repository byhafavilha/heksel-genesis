<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEKSEL GENESIS — NEO-KAI 01</title>

    <link rel="icon" type="image/png" href="Logo.png">
    <link rel="shortcut icon" href="Logo.png" type="image/png">
    <link rel="apple-touch-icon" href="Logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Syncopate:wght@400;700&family=Lexend:wght@200;400&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --cyan: #00f5ff; --pink: #ff00cc; --onyx: #060608; }

        body {
            background: var(--onyx);
            color: #fff;
            font-family: 'Lexend', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .founder-photo {
            width: 180px; height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--cyan);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
            margin-bottom: 20px;
        }

        .cta-button {
            padding: 15px 40px;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            background: transparent;
            font-family: 'Syncopate';
            font-size: 11px;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.4s;
            text-decoration: none;
            display: inline-block;
        }

        .cta-button:hover {
            background: var(--cyan);
            color: #000;
            box-shadow: 0 0 30px var(--cyan);
        }

        /* GRID ORGANIZADO */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .social-card {
            height: 450px; /* Altura fixa para ser simétrico */
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            background: #000;
        }

        .social-card img, .social-card video {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 20px; left: 20px;
            font-family: 'Syncopate';
            font-size: 9px;
            z-index: 5;
        }
    </style>
</head>
<body>

    <header style="padding: 40px; text-align: center;">
        <img src="Logo.png" alt="HEKSEL" style="height: 25px; opacity: 0.7;">
    </header>

    <section style="text-align: center; padding: 40px 20px;">
        <img src="tenis.png" alt="NEO-KAI 01" style="max-width: 80%; height: auto; max-height: 500px;">
        <h1 style="font-family: 'Syncopate'; font-size: clamp(2rem, 8vw, 5rem); margin-top: 20px;">NEO-KAI 01</h1>
    </section>

    <section style="padding: 80px 10%; text-align: center; background: #08080a;">
        <p style="font-family: 'Syncopate'; color: var(--cyan); letter-spacing: 5px; font-size: 10px; margin-bottom: 20px;">MAIO 2026</p>
        <h2 style="font-family: 'Syncopate'; font-size: clamp(3rem, 10vw, 7rem);">14:15:00</h2>
    </section>

    <section style="padding: 100px 5%; text-align: center;">
        <img src="hafavilha.png" alt="Guilherme" class="founder-photo">
        <h3 style="font-family: 'Syncopate'; font-size: 12px; color: var(--cyan); margin-bottom: 10px;">GUILHERME HAFAVILHA</h3>
        <p style="font-family: 'Cormorant Garamond'; font-size: 24px; font-style: italic; max-width: 700px; margin: 0 auto 40px; opacity: 0.8;">
            "A HEKSEL não é apenas uma marca, é a materialização do futuro nos seus pés."
        </p>
        
        <a href="https://wa.me/5511952264585" target="_blank" class="cta-button">FALAR COM O FUNDADOR</a>

        <div class="social-grid">
            <div class="social-card">
                <a href="https://www.tiktok.com/@hafavilha" target="_blank">
                    <img src="tenis.png" alt="Neo-Kai">
                </a>
                <div class="video-label" style="color: var(--cyan);">TIKTOK @HAFAVILHA</div>
            </div>

            <div class="social-card">
                <a href="https://www.instagram.com/p/DY3QC7UzB7v/?igsh=dWFoejdpaTNvZ2Nl" target="_blank">
                    <video autoplay muted loop playsinline>
                        <source src="video-insta.mp4" type="video/mp4">
                    </video>
                </a>
                <div class="video-label" style="color: var(--pink);">INSTAGRAM @HAFAVILHA</div>
            </div>

            <div class="social-card">
                <a href="https://x.com/i/status/2059987935554830777" target="_blank">
                    <img src="relogio.png" alt="Relógio">
                </a>
                <div class="video-label" style="color: #fff;">X (TWITTER) @HAFAVILHA</div>
            </div>
        </div>
    </section>

    <footer style="padding: 60px 20px; text-align: center; opacity: 0.3; font-size: 8px; font-family: 'Syncopate';">
        © 2026 HEKSEL GENESIS
    </footer>

</body>
</html>
